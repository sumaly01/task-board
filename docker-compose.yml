version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# TaskFlow — Docker Compose
#
# Start everything:  docker-compose up --build
# Wipe all data:     docker-compose down -v && docker-compose up --build
# Logs for one svc:  docker-compose logs -f auth-service
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  # Zookeeper — Kafka's coordination layer.
  # Kafka uses Zookeeper to elect a cluster leader, store broker metadata, and
  # track which partitions belong to which broker. It must be healthy before
  # Kafka starts. In production you'd run 3 Zookeeper nodes for HA; here one is
  # enough for development.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: taskflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'cub', 'zk-ready', 'localhost:2181', '30']
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s

  # Kafka — The message broker at the heart of the event-driven architecture.
  # Task Service publishes events (task.created, task.updated, task.deleted).
  # Notification Service subscribes to those events and triggers Socket.io pushes.
  # This decouples services: Task Service never imports or calls Notification Service.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: taskflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: PLAINTEXT for container-to-container, PLAINTEXT_HOST for host machine
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list']
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  # Redis — Multi-purpose in-memory store. Used for:
  # 1. Refresh token storage (TTL 7 days) — faster than PostgreSQL for hot auth paths
  # 2. Task list cache (TTL 60s) — avoids DB queries on every GET /tasks
  # 3. Rate limit counters (TTL 60s) — sliding window implemented in API Gateway
  # 4. Socket.io pub/sub — when Notification Service runs multiple instances,
  #    Redis fan-outs the push so the right instance delivers to the right socket
  redis:
    image: redis:7.2-alpine
    container_name: taskflow-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # auth-db — PostgreSQL for auth-service ONLY.
  # Separate database per service is a microservices best practice: each service
  # owns its schema, can run its own migrations, and can scale independently.
  # The auth-service is the only one with credentials to this database.
  auth-db:
    image: postgres:15-alpine
    container_name: taskflow-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - '5401:5432'
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # task-db — PostgreSQL for task-service ONLY.
  # Runs on host port 5433 so you can connect to both DBs from a local GUI
  # (e.g. TablePlus) without port conflicts.
  task-db:
    image: postgres:15-alpine
    container_name: taskflow-task-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_db
    ports:
      - '5433:5432'
    volumes:
      - task_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d task_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application Services ──────────────────────────────────────────────────

  # auth-service — Handles user registration, login, token refresh, and logout.
  # Issues short-lived JWT access tokens (15 min) and long-lived refresh tokens
  # (7 days). Refresh tokens are stored in Redis so they can be invalidated
  # server-side on logout — something you cannot do with stateless JWTs alone.
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: taskflow-auth-service
    ports:
      - '4001:4001'
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://postgres:postgres@auth-db:5432/auth_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme_jwt_secret_replace_in_production
      JWT_REFRESH_SECRET: changeme_refresh_secret_replace_in_production
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # task-service — Owns project and task CRUD.
  # Also acts as a Kafka producer: every write operation publishes an event
  # (task.created, task.updated, task.deleted) so downstream services react
  # without being coupled to this one.
  # Uses Redis to cache GET /tasks?projectId= results for 60 seconds.
  task-service:
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
    container_name: taskflow-task-service
    ports:
      - '4002:4002'
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://postgres:postgres@task-db:5432/task_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: changeme_jwt_secret_replace_in_production
    depends_on:
      task-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # notification-service — The event-driven consumer.
  # Listens to Kafka topics and delivers real-time notifications via Socket.io
  # WebSockets. Uses Redis pub/sub as a bridge: if we ever run multiple instances
  # of this service, Kafka delivers to only one, but Redis fan-outs to all
  # instances so the correct instance can push to the correct user's socket.
  # Also runs a node-cron job every 5 minutes to check for upcoming due dates.
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: taskflow-notification-service
    ports:
      - '4003:4003'
    environment:
      PORT: 4003
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4003/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # api-gateway — The single front door for all HTTP traffic.
  # The frontend and Postman only talk to port 4000. The gateway:
  # 1. Validates the JWT on every protected request (one place, not per service)
  # 2. Enforces rate limiting (prevents abuse without touching business logic)
  # 3. Proxies /auth/* → auth-service, /projects/* and /tasks/* → task-service
  # This means auth and task services never receive unauthenticated requests.
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: taskflow-api-gateway
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      TASK_SERVICE_URL: http://task-service:4002
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme_jwt_secret_replace_in_production
    depends_on:
      auth-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # frontend — Next.js 14 App Router UI.
  # Runs in dev mode for the development container. Uses the api-gateway as its
  # backend (port 4000). NEXT_PUBLIC_ variables are embedded in the browser
  # bundle at build time, so they use localhost (host machine port) not the
  # Docker service name.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4003
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

# ── Named Volumes ─────────────────────────────────────────────────────────────
# Data is persisted across container restarts in named volumes.
# Run `docker-compose down -v` to wipe all data for a clean slate.
volumes:
  auth_db_data:
  task_db_data:
